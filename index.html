<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P3 — PID Motor Control</title>
<script type="module"
    src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.0-RC.8/bundles/datastar.js">
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Courier New', monospace;
    background: #0a0e14;
    color: #c8ccd4;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.1em;
    color: #5fb3b3;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .subtitle {
    font-size: 0.7em;
    color: #4b5563;
    margin-bottom: 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .card {
    background: #131820;
    border: 1px solid #1e2630;
    border-radius: 6px;
    padding: 12px;
  }

  .card-label {
    font-size: 0.65em;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .card-value {
    font-size: 1.5em;
    font-weight: bold;
    color: #e6e8eb;
  }

  .card-unit {
    font-size: 0.55em;
    color: #6b7280;
    margin-left: 4px;
  }

  .error-ok   { color: #99c794 !important; }
  .error-warn { color: #fac863 !important; }
  .error-bad  { color: #ec5f67 !important; }

  .duty-bar-bg {
    width: 100%;
    height: 6px;
    background: #1e2630;
    border-radius: 3px;
    margin-top: 6px;
  }

  .duty-bar {
    height: 100%;
    background: #5fb3b3;
    border-radius: 3px;
    transition: width 0.15s;
  }

  .gains-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .gain-chip {
    background: #131820;
    border: 1px solid #1e2630;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 0.8em;
  }

  .gain-name {
    color: #5fb3b3;
    margin-right: 6px;
  }

  .tune-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
    flex-wrap: wrap;
  }

  .tune-group {
    background: #131820;
    border: 1px solid #1e2630;
    border-radius: 6px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.8em;
  }

  .tune-group label {
    color: #5fb3b3;
    min-width: 20px;
  }

  .tune-group input[type="range"] {
    width: 100px;
    accent-color: #5fb3b3;
  }

  .tune-group .tune-val {
    min-width: 24px;
    text-align: right;
    color: #e6e8eb;
  }

  .tune-btn {
    background: #5fb3b3;
    color: #0a0e14;
    border: none;
    border-radius: 4px;
    padding: 6px 14px;
    font-family: 'Courier New', monospace;
    font-size: 0.8em;
    font-weight: bold;
    cursor: pointer;
  }

  .tune-btn:hover { background: #7cc9c9; }
  .tune-btn:active { background: #4a9a9a; }

  .tune-btn-outline {
    background: #1e2630;
    color: #5fb3b3;
    border: 1px solid #5fb3b3;
  }

  .tune-btn-outline:hover { background: #252f3d; }

  .chart-container {
    background: #131820;
    border: 1px solid #1e2630;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 14px;
  }

  .chart-title {
    font-size: 0.7em;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  canvas {
    width: 100%;
    height: 180px;
    display: block;
  }

  .legend {
    display: flex;
    gap: 18px;
    margin-top: 6px;
    font-size: 0.7em;
  }

  .legend-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    font-size: 0.65em;
    color: #4b5563;
    margin-top: 6px;
    align-items: center;
  }

  .conn-ok   { color: #99c794; }
  .conn-bad  { color: #ec5f67; }

  .conn-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .status-flash {
    background: #1e2630;
    color: #fac863;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 0.75em;
    margin-bottom: 10px;
    animation: flash 0.3s ease;
  }

  @keyframes flash {
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- DataStar root: signals init (ZII) + SSE connect via data-init -->
<div data-signals="{
        tick: '0', setpoint: '0', actual: '0', error: '0',
        output: '0', edges: '0', rpm: '0',
        kp: '5', ki: '1', kd: '0', connected: '0',
        tuneKp: '5', tuneKi: '1', tuneKd: '0', cmd: ''
     }"
     data-init="@get('/events')">

  <h1>P3 — PID Motor Control</h1>
  <div class="subtitle">STM32F103C8T6 · Q8.8 Fixed-Point · 20kHz PWM · Hall Sensor RPM</div>

  <!-- Status message target (populated by patch-elements) -->
  <div id="status-msg"></div>

  <!-- Gain display -->
  <div class="gains-row">
    <div class="gain-chip"><span class="gain-name">Kp</span><span data-text="$kp"></span></div>
    <div class="gain-chip"><span class="gain-name">Ki</span><span data-text="$ki"></span></div>
    <div class="gain-chip"><span class="gain-name">Kd</span><span data-text="$kd"></span></div>
  </div>

  <!-- Live values grid -->
  <div class="grid">
    <div class="card">
      <div class="card-label">Setpoint</div>
      <div class="card-value">
        <span data-text="$setpoint"></span><span class="card-unit">RPM</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Actual RPM</div>
      <div class="card-value">
        <span data-text="$rpm"></span><span class="card-unit">RPM</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Error</div>
      <div class="card-value">
        <span data-text="$error"
              data-class:error-ok="Math.abs(Number($error)) < 500"
              data-class:error-warn="Math.abs(Number($error)) >= 500 && Math.abs(Number($error)) < 1500"
              data-class:error-bad="Math.abs(Number($error)) >= 1500">
        </span><span class="card-unit">RPM</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Duty Cycle</div>
      <div class="card-value">
        <span data-text="$output"></span><span class="card-unit">/ 49</span>
      </div>
      <div class="duty-bar-bg">
        <div class="duty-bar"
             data-attr:style="'width:' + Math.min(100, (Number($output) / 49) * 100).toFixed(0) + '%'">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Edge Count</div>
      <div class="card-value"><span data-text="$edges"></span></div>
    </div>

    <div class="card">
      <div class="card-label">Uptime</div>
      <div class="card-value">
        <span data-text="(Number($tick) / 1000).toFixed(1)"></span><span class="card-unit">s</span>
      </div>
    </div>
  </div>

  <!-- Gain tuning sliders -->
  <div class="tune-row">
    <div class="tune-group">
      <label>Kp</label>
      <input type="range" min="0" max="20" data-bind:tune-kp>
      <span class="tune-val" data-text="$tuneKp"></span>
    </div>
    <div class="tune-group">
      <label>Ki</label>
      <input type="range" min="0" max="10" data-bind:tune-ki>
      <span class="tune-val" data-text="$tuneKi"></span>
    </div>
    <div class="tune-group">
      <label>Kd</label>
      <input type="range" min="0" max="10" data-bind:tune-kd>
      <span class="tune-val" data-text="$tuneKd"></span>
    </div>
    <button class="tune-btn"
            data-on:click="
              $kp = $tuneKp; $ki = $tuneKi; $kd = $tuneKd;
			  $cmd = 'KP ' + $tuneKp; @post('/cmd');
			  $cmd = 'KI ' + $tuneKi; @post('/cmd');
			  $cmd = 'KD ' + $tuneKd; @post('/cmd');
			  $cmd = 'SET'; @post('/cmd');
            ">
      APPLY
    </button>
    <button class="tune-btn tune-btn-outline"
            data-on:click="$cmd = 'INSPECT'; @post('/cmd');">
      INSPECT
    </button>
  </div>

  <!-- Rolling chart -->
  <div class="chart-container">
    <div class="chart-title">Setpoint vs Actual RPM</div>

    <canvas id="chart" height="180"
            data-ref:rpm-chart
            data-ignore-morph>
    </canvas>

    <!-- data-effect: redraw when signals change -->
    <div data-effect="window.__drawChart($rpmChart, $setpoint, $rpm, $output)"
         style="display:none">
    </div>

    <div class="legend">
      <div><span class="legend-dot" style="background:#5fb3b3"></span>Setpoint</div>
      <div><span class="legend-dot" style="background:#99c794"></span>Actual RPM</div>
      <div><span class="legend-dot" style="background:#ec5f67"></span>Duty × 120</div>
    </div>
  </div>

  <!-- Status bar with connection dot -->
  <div class="status-bar">
    <span>Bare-metal C89 · -nostdlib -ffreestanding · Zero HAL</span>
    <span>
      <span class="conn-dot"
            data-style:background="$connected == '1' ? '#99c794' : '#ec5f67'">
      </span>
      <span data-text="$connected == '1' ? 'connected' : 'disconnected'"
            data-class:conn-ok="$connected == '1'"
            data-class:conn-bad="$connected != '1'">
      </span>
    </span>
  </div>

</div><!-- end DataStar root -->

<!-- Chart drawing (vanilla JS, called by data-effect) -->
<script>
(function() {
  var HISTORY_LEN = 150;
  var MAX_Y = 6000;
  var history = { setpoint: [], rpm: [], duty: [] };
  var lastDraw = 0;
  var resized = false;

  window.__drawChart = function(canvas, setpoint, rpm, output) {
    if (!canvas) return;

    var now = performance.now();
    if (now - lastDraw < 33) return;
    lastDraw = now;

    if (!resized) {
      canvas.width  = canvas.clientWidth * 2;
      canvas.height = canvas.clientHeight * 2;
      resized = true;
    }

    history.setpoint.push(Number(setpoint) || 0);
    history.rpm.push(Number(rpm) || 0);
    history.duty.push(Number(output) || 0);

    if (history.setpoint.length > HISTORY_LEN) {
      history.setpoint.shift();
      history.rpm.shift();
      history.duty.shift();
    }

    var ctx = canvas.getContext("2d");
    var w = canvas.width;
    var h = canvas.height;
    var len = history.setpoint.length;
    var i, x, y;

    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = "#1e2630";
    ctx.lineWidth = 1;
    for (i = 0; i <= 5; i++) {
      y = h - (i / 5) * h;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(w, y);
      ctx.stroke();
    }

    ctx.fillStyle = "#4b5563";
    ctx.font = "20px Courier New";
    ctx.textAlign = "left";
    for (i = 0; i <= 5; i++) {
      y = h - (i / 5) * h;
      ctx.fillText(String(i * MAX_Y / 5), 4, y - 4);
    }

    if (len < 2) return;

    ctx.strokeStyle = "#5fb3b3";
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (i = 0; i < len; i++) {
      x = (i / (HISTORY_LEN - 1)) * w;
      y = h - (history.setpoint[i] / MAX_Y) * h;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.strokeStyle = "#99c794";
    ctx.lineWidth = 3;
    ctx.beginPath();
    for (i = 0; i < len; i++) {
      x = (i / (HISTORY_LEN - 1)) * w;
      y = h - (history.rpm[i] / MAX_Y) * h;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.strokeStyle = "#ec5f67";
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    for (i = 0; i < len; i++) {
      x = (i / (HISTORY_LEN - 1)) * w;
      y = h - (history.duty[i] * 120 / MAX_Y) * h;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  };

  window.addEventListener("resize", function() {
    resized = false;
  });
})();
</script>
</body>
</html>
